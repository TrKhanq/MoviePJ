<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/register.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-film icon-logo" viewBox="0 0 16 16">
                    <path d="M0 1a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1zm4 0v6h8V1zm8 8H4v6h8zM1 1v2h2V1zm2 3H1v2h2zM1 7v2h2V7zm2 3H1v2h2zm-2 3v2h2v-2zM15 1h-2v2h2zm-2 3v2h2V4zm2 3h-2v2h2zm-2 3v2h2v-2zm2 3h-2v2h2z"/>
                </svg>
                <span class="icon_main" style="color: white">Rikkei</span>
                <span class="icon_main" style="color: red">Cinema</span>
            </div>
            <div class="navi">
                <li><a href="./index.html">Trang chủ</a></li>
                <li><a href="/infor">Thông tin</a></li>
                <li><a href="/contact">Liên hệ</a></li>
                <li class="btn-log">Đăng nhập</li>
            </div>
    </header>
    <main>
        <div class="form_container_reg">
            <div class="form_reg">
                <h2>Tạo tài khoản mới</h2>
                <p class="form_subtitle">Đăng ký để đặt vé xem phim ngay hôm nay</p>
                
                <form>
                    <label for="fullname">Họ và tên</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Nguyễn Văn A" >
                    
                    <label for="email">Email</label> 
                    <input type="email" id="email" name="email" placeholder="email@example.com" >
                    
                    <label for="password">Mật khẩu</label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" placeholder="••••••••">
                        <span class="toggle-password">👁️</span>
                    </div>
                    
                    <label for="confirm-password">Xác nhận mật khẩu</label>
                    <div class="password-input">
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" >
                        <span class="toggle-password">👁️</span>
                    </div>
                    
                    <div class="form-agreement">
                        <input type="checkbox" id="agreement" name="agreement" >
                        <label for="agreement" class="agreement-label" >Tôi đồng ý với <span>điều khoản sử dụng</span> và <span>chính sách bảo mật</span> của CineHub</label>
                    </div>
                    
                    <button type="submit" class="btn-register">Đăng ký ➜</button>
                </form>
                
                <p class="login-text">Đã có tài khoản? <a href="./login.html">Đăng nhập ngay</a></p>
            </div>
        </div>  
    </main>
    <script type="module" src="../js/register.js"></script>
</body>
</html>
